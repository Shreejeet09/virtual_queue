<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="admin-body">
  <aside class="sidebar">
    <h2>Queue Admin</h2>
    <p>Desktop Dashboard</p>
    <a href="index.html">Home</a>
    <a href="user.html">User Page</a>
  </aside>

  <main class="dashboard">
    <header class="dash-header">
      <div>
        <h1>Smart Virtual Queue Dashboard</h1>
        <p>Live queue management panel</p>
      </div>
      <button id="resetBtn" class="btn danger">Reset Queue</button>
    </header>

    <section class="stats-grid">
      <div class="stat-card">
        <span>Now Serving</span>
        <strong id="currentToken">--</strong>
      </div>
      <div class="stat-card">
        <span>Last Token</span>
        <strong id="lastToken">0</strong>
      </div>
      <div class="stat-card">
        <span>Waiting</span>
        <strong id="waitingCount">0</strong>
      </div>
      <div class="stat-card">
        <span>Served</span>
        <strong id="servedCount">0</strong>
      </div>
    </section>

    <section class="control-panel">
      <button id="callNextBtn" class="btn primary">Call Next Token</button>
      <button id="skipBtn" class="btn warning">Skip Current</button>
    </section>

    <section class="queue-section">
      <h2>Waiting Queue</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Token</th>
              <th>Status</th>
              <th>Created At</th>
            </tr>
          </thead>
          <tbody id="queueTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="admin.js"></script>
</body>
</html>

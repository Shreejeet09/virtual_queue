<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Token | Smart Queue</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="mobile-body">
  <main class="phone-frame">
    <section class="mobile-card hero">
      <p class="tag">Smart Queue</p>
      <h1>Take Your Token</h1>
      <p>Scan QR, enter details, and wait comfortably until your turn comes.</p>
    </section>

    <section class="mobile-card" id="formCard">
      <label>Your Name</label>
      <input id="userName" type="text" placeholder="Enter your name" />

      <label>Mobile Number</label>
      <input id="userPhone" type="tel" placeholder="Enter mobile number" />

      <label>Purpose</label>
      <select id="userPurpose">
        <option value="General Enquiry">General Enquiry</option>
        <option value="Payment / Fees">Payment / Fees</option>
        <option value="Document Submission">Document Submission</option>
        <option value="Support / Helpdesk">Support / Helpdesk</option>
      </select>

      <button class="btn primary full" onclick="takeToken()">Generate Token</button>
    </section>

    <section class="mobile-card token-card hidden" id="tokenCard">
      <p class="tag success">Token Generated</p>
      <h2 id="tokenNumber">T-001</h2>
      <p id="statusText">You are waiting in queue.</p>
      <div class="queue-stats">
        <div>
          <span id="peopleAhead">0</span>
          <small>People Ahead</small>
        </div>
        <div>
          <span id="waitTime">0 min</span>
          <small>Approx Wait</small>
        </div>
      </div>
      <div class="alert-box" id="alertBox">Keep this page open to see live updates.</div>
      <button class="btn danger full" onclick="cancelMyToken()">Cancel My Token</button>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
